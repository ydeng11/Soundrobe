name: Tauri

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Typecheck and test
        run: npm test && npm run typecheck
        working-directory: frontend

  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac
            artifact: macos-arm64
          - os: macos-15-intel
            command: npm run dist:mac
            artifact: macos-x64
          - os: windows-latest
            command: npm run dist:win
            artifact: windows-x64
          - os: ubuntu-22.04
            command: npm run dist:linux
            artifact: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build unsigned bundles
        run: ${{ matrix.command }}
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/src-tauri/target/release/bundle/**
          if-no-files-found: error
