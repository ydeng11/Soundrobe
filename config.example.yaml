# Soundrobe configuration
# Copy to ~/.auto-tagger/config.yaml.

# OpenRouter credentials. Environment alternatives: LLM_API_KEY and LLM_MODEL.
# llm_api_key: sk-or-v1-...
llm_model: anthropic/claude-3.5-haiku

# Provider configuration. Environment alternative: AUTO_TAG_DISCOGS_TOKEN.
# discogs_token: ...
remote_lookup_enabled: true
discogs_enabled: true
# theaudiodb_api_key: ...

# Optional local MusicMoveArr SQLite index. The app continues without it when
# the path is absent or invalid.
dataset_path: ~/.auto-tagger/dataset-index.sqlite

# Debug and lyrics behavior.
debug: false
lyrics_download_enabled: true
lyrics_api_url: https://lrclib.net/api/get

# Enforce a Chinese script variant when writing tag text.
# Accepts: simplified/sc, traditional/tc, or omit to disable.
# chinese_script: simplified
